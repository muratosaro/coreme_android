# coturn TURN server configuration for CoreMe
#
# Install on VPS:
#   apt-get install -y coturn
#   cp server/turn/turnserver.conf /etc/turnserver.conf
#   systemctl enable coturn
#   systemctl start coturn
#
# Or run as Docker container (see server/turn/Dockerfile).

# ── Network ────────────────────────────────────────────────────────────────────
# Replace with the VPS public IP
# listening-ip=<VPS_PUBLIC_IP>
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

# ── TLS ───────────────────────────────────────────────────────────────────────
# Use the same Let's Encrypt cert as Nginx, or a dedicated cert.
# cert=/etc/letsencrypt/live/<domain>/fullchain.pem
# pkey=/etc/letsencrypt/live/<domain>/privkey.pem

# ── Authentication ────────────────────────────────────────────────────────────
# Long-term credential mechanism (RFC 5389 / RFC 5766) — required for WebRTC
# user= and realm= are injected at runtime by entrypoint.sh via env vars:
#   TURN_USERNAME, TURN_PASSWORD, TURN_REALM
lt-cred-mech
fingerprint

# ── Security ──────────────────────────────────────────────────────────────────
# Do not allow relay to local addresses (prevents SSRF)
no-loopback-peers
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# ── Performance ───────────────────────────────────────────────────────────────
verbose
no-stdout-log
log-file=/var/log/coturn/turn.log
pidfile=/var/run/coturn/turnserver.pid
