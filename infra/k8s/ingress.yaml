apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coreme-ingress
  namespace: coreme
  annotations:
    # Traefik (K3s default ingress controller)
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # cert-manager TLS (install: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml)
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.coreme.app
      secretName: coreme-tls
  rules:
    - host: api.coreme.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: coreme-api
                port:
                  number: 3001
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: coreme-api
                port:
                  number: 3001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: coreme-realtime
                port:
                  number: 3002
