# CoreMe SealedSecret for K3s
#
# This file is SAFE to commit — encrypted with the cluster's public key.
# Raw Secret manifests must NEVER be committed (blocked by .gitignore).
#
# Prerequisites:
#   kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#   brew install kubeseal  # or https://github.com/bitnami-labs/sealed-secrets/releases
#
# To update a secret value:
#   1. Create a plain Secret YAML (do NOT commit it):
#        kubectl create secret generic coreme-secrets \
#          --from-literal=DB_PASSWORD=... \
#          --from-literal=JWT_SECRET=... \
#          --from-literal=JWT_REFRESH_SECRET=... \
#          --from-literal=SENTRY_DSN=... \
#          --dry-run=client -o yaml > /tmp/secret.yaml
#   2. Seal it:
#        kubeseal --format yaml < /tmp/secret.yaml > server/k8s/sealed-secrets/coreme-sealedsecret.yaml
#   3. Apply it (or let ArgoCD/Flux pick it up):
#        kubectl apply -f server/k8s/sealed-secrets/coreme-sealedsecret.yaml
#   4. Delete the plain secret:
#        rm /tmp/secret.yaml
#
# The placeholder encryptedData below is illustrative. Replace with real
# kubeseal output after sealing your actual values.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: coreme-secrets
  namespace: coreme
spec:
  encryptedData:
    DB_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    JWT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    JWT_REFRESH_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    SENTRY_DSN: REPLACE_WITH_KUBESEAL_OUTPUT
    FIREBASE_SERVICE_ACCOUNT_KEY: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: coreme-secrets
      namespace: coreme
    type: Opaque
